name: Deploy Staging

on:
  push:
    branches: [staging, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - "LICENSE"
      - "CHANGELOG.md"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy to staging"
        required: false
        default: "main"
        type: string

permissions:
  contents: read
  deployments: write

concurrency:
  group: staging
  cancel-in-progress: false

jobs:
  # ==================== CI CHECKS ====================
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # ==================== DEPLOY STAGING ====================
  deploy-staging:
    name: Deploy Staging to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [ci]
    if: needs.ci.result == 'success'
    environment:
      name: staging
      url: "https://kuromanga.osanugroho03.workers.dev"
    outputs:
      url: "https://kuromanga.osanugroho03.workers.dev"
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare Workers (Staging)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
          NEXT_PUBLIC_API_URL: "https://www.sankavollerei.com"
          NODE_ENV: production
        run: pnpm run build:cf

      - name: Deploy to Cloudflare Workers (Staging)
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --name kuromanga-staging

      - name: Set Staging Worker Secrets
        # Push server-side secrets to the staging worker via wrangler.
        # NEXT_PUBLIC_* vars are baked into the bundle at build time and do not
        # need to be set here. Secrets persist across deployments — re-applied
        # here so the workflow is fully self-contained.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SECRET_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_CLERK_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          SECRET_CLERK_WEBHOOK: ${{ secrets.CLERK_WEBHOOK_SECRET }}
        run: |
          echo "$SECRET_DATABASE_URL" | pnpm exec wrangler secret put DATABASE_URL --name kuromanga-staging
          echo "$SECRET_CLERK_KEY" | pnpm exec wrangler secret put CLERK_SECRET_KEY --name kuromanga-staging
          if [ -n "$SECRET_CLERK_WEBHOOK" ]; then
            echo "$SECRET_CLERK_WEBHOOK" | pnpm exec wrangler secret put CLERK_WEBHOOK_SECRET --name kuromanga-staging
          fi

      - name: Deployment Summary
        env:
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "## Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| -------- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://kuromanga.osanugroho03.workers.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${COMMIT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${BRANCH_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${ACTOR} |" >> $GITHUB_STEP_SUMMARY

  # ==================== POST-STAGING TESTS ====================
  post-staging-tests:
    name: Post-Staging E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-staging]
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Health Check
        uses: ./.github/actions/health-check
        with:
          url: "https://kuromanga.osanugroho03.workers.dev/api/health"
          max-retries: "5"
          retry-delay: "10"
          initial-delay: "20"

      - name: Warm up pages
        run: |
          echo "Warming up key pages before E2E tests..."
          for path in "/" "/komik" "/anime"; do
            url="https://kuromanga.osanugroho03.workers.dev${path}"
            status=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 30 "$url" || echo "000")
            echo "  ${path} -> HTTP ${status}"
          done

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          playwright-browsers: "chromium"

      - name: Run E2E tests against staging
        run: pnpm exec playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: "https://kuromanga.osanugroho03.workers.dev"

      - name: Staging Summary
        if: always()
        env:
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          echo "## Staging Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| -------- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://kuromanga.osanugroho03.workers.dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${COMMIT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${BRANCH_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Ready for testing |" >> $GITHUB_STEP_SUMMARY
