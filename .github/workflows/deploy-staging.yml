name: Deploy Staging

on:
  push:
    branches: [staging, develop]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy to staging"
        required: false
        default: "staging"
        type: string

permissions:
  contents: read
  deployments: write

concurrency:
  group: staging
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ==================== CI CHECKS ====================
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  # ==================== DEPLOY STAGING ====================
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ci]
    if: needs.ci.result == 'success'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@50

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Staging)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Alias to staging subdomain
        run: |
          vercel alias set ${{ steps.deploy.outputs.url }} staging-komikmanga.vercel.app --token=${{ secrets.VERCEL_TOKEN }} || true

      - name: Create Deployment Status
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const url = process.env.DEPLOY_URL;
            console.log(`Deployed to staging: ${url}`);

  # ==================== POST-STAGING TESTS ====================
  post-staging-tests:
    name: Post-Staging Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-staging]
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          playwright-browsers: "chromium"

      - name: Run E2E tests against staging
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy-staging.outputs.url }}

      - name: Health Check
        continue-on-error: true
        uses: ./.github/actions/health-check
        with:
          url: "${{ needs.deploy-staging.outputs.url }}/api/health"
          max-retries: "3"
          retry-delay: "10"
          initial-delay: "15"

      - name: Staging Summary
        env:
          DEPLOY_URL: ${{ needs.deploy-staging.outputs.url }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          echo "## Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| -------- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${DEPLOY_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${COMMIT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${BRANCH_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Ready for testing |" >> $GITHUB_STEP_SUMMARY
