name: Deploy Deno Proxy

on:
  push:
    branches: [main]
    paths:
      - "deno-proxy/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required by denoland/deployctl

concurrency:
  group: deno-proxy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Deno Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@1.13.1
        with:
          project: kanekicraynet/kuromanga-proxy
          entrypoint: deno-proxy/main.ts
          token: ${{ secrets.DENO_DEPLOY_TOKEN }}
