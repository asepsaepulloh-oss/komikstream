name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - "LICENSE"
  workflow_call:
    inputs:
      skip-security:
        description: "Skip security job (when caller has its own)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== CHECKS (Lint, TypeCheck, Prisma) ====================
  checks:
    name: Lint, TypeCheck & Prisma
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          prisma-generate: "true"

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Check Prisma schema formatting
        run: |
          npx prisma format
          if ! git diff --exit-code --quiet prisma/schema.prisma; then
            echo "::error::Prisma schema is not formatted. Run 'npx prisma format' locally and commit."
            git diff prisma/schema.prisma
            exit 1
          fi
          echo "Prisma schema formatting is correct."

  # ==================== TESTS ====================
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          prisma-generate: "true"

      - name: Run tests with coverage
        run: npm test -- --coverage --coverageReporters=lcov --coverageReporters=text

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0561704f0f02c16a585d4c7555e57fa2e44cf909 # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-KuroManga
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ==================== BUILD ====================
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [checks, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          prisma-generate: "true"
          next-cache: "true"

      - name: Build application
        # Verify that `next build` compiles without errors.
        # DATABASE_URL uses a dummy value so Prisma doesn't throw during
        # module load; no actual DB connection is made at build time.
        # Real values are injected only in the production deploy workflow.
        run: npm run build
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dummy"
          CLERK_SECRET_KEY: "sk_test_dummy"

      - name: Check build output
        run: |
          echo "Build completed successfully!"
          ls -la .next/

      - name: Report bundle size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "| ---- | ---- |" >> $GITHUB_STEP_SUMMARY
          find .next/static/chunks -name "*.js" -type f -exec ls -lh {} \; | awk '{print "| " $NF " | " $5 " |"}' | head -20 >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total .next folder size:** $(du -sh .next | cut -f1)" >> $GITHUB_STEP_SUMMARY

  # ==================== SECURITY ====================
  security:
    name: Security Audit
    if: ${{ !inputs.skip-security }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup project
        uses: ./.github/actions/setup

      - name: Run npm audit (critical)
        run: npm audit --audit-level=critical

      - name: Run npm audit (high — advisory)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Gitleaks - Check for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  # ==================== DEPENDENCY REVIEW (PR only) ====================
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: critical
          comment-summary-in-pr: always
