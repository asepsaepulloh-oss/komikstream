name: Deploy Azure

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - "package.json"
      - "**.md"
      - "workers/**"
      - "wrangler.jsonc"
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip tests before deployment"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  id-token: write # Required for OIDC federated credentials
  issues: write # Required for creating issues on failure

concurrency:
  group: azure-production
  cancel-in-progress: false

jobs:
  # ==================== CI CHECKS ====================
  # Runs full CI pipeline including security audit via ci.yml
  ci:
    name: CI Checks
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    uses: ./.github/workflows/ci.yml
    with:
      # ci.yml already includes security checks, no need to duplicate
      skip-security: false

  # ==================== BUILD & DEPLOY TO AZURE ====================
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ci]
    if: |
      always() &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      (needs.ci.result == 'success' || github.event.inputs.skip_tests == 'true')
    environment:
      name: production
      url: "https://kuromanga.me"
    outputs:
      deployment_url: ${{ steps.deploy.outputs.webapp-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          prisma-generate: "true"
          next-cache: "true"

      - name: Build for Azure (standalone)
        env:
          BUILD_TARGET: azure
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_PROXY_URL: "https://clerk.kuromanga.me"
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
          NEXT_PUBLIC_API_URL: "https://www.sankavollerei.com"
          # Use dummy DATABASE_URL during build - Azure PostgreSQL is behind VNet
          # and not accessible from GitHub Actions. Real DATABASE_URL is injected
          # at runtime via Azure App Service environment variables.
          DATABASE_URL: "postgresql://build:build@localhost:5432/build"
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          SKIP_DB_CONNECTION: "true"
          NODE_ENV: production
        # Use build:azure script which includes --webpack flag to opt out of Turbopack.
        # Next.js 16 defaults to Turbopack, but it has known issues with
        # React Client Manifest generation causing 503 errors at runtime.
        run: pnpm run build:azure

      - name: Prepare deployment package
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          cp -r prisma .next/standalone/prisma

          # Fix pnpm virtual-store packages missing from the standalone output.
          #
          # pnpm stores packages in .pnpm/ and uses symlinks in node_modules/.
          # Next.js file tracing copies these entries into standalone/node_modules/
          # but does NOT copy the .pnpm/ virtual store itself, so symlinks break
          # after zip extraction on Azure.
          #
          # Two categories need different fixes:
          # A) .prisma/client — not at node_modules/.prisma/ in pnpm projects
          #    (Prisma generates into the virtual store). File tracer never finds it.
          #    Fix: locate in .pnpm/ and copy directly.
          # B) @prisma/* sub-packages (Prisma 7 split internals into separate pkgs)
          #    and other packages that remain as symlinks in standalone.
          #    Fix: copy from .pnpm/ store + resolve remaining symlinks.
          STANDALONE_NM=".next/standalone/node_modules"

          # ── A: .prisma/client (Prisma generated client) ──────────────────────
          echo "Copying .prisma/client from pnpm store..."
          PRISMA_SRC=$(find node_modules/.pnpm -type d -name "client" -path "*/.prisma/*" 2>/dev/null | head -1)
          if [ -n "$PRISMA_SRC" ]; then
            rm -rf "$STANDALONE_NM/.prisma"
            mkdir -p "$STANDALONE_NM/.prisma"
            cp -rL "$PRISMA_SRC" "$STANDALONE_NM/.prisma/client"
            echo "  ✅ .prisma/client (from $PRISMA_SRC)"
          else
            echo "  ❌ ERROR: .prisma/client not found in pnpm store!"
            exit 1
          fi

          # ── B: @prisma/* sub-packages ────────────────────────────────────────
          echo "Copying @prisma/* sub-packages from pnpm store..."
          mkdir -p "$STANDALONE_NM/@prisma"
          for SRC_PKG in node_modules/.pnpm/@prisma+*/node_modules/@prisma/*/; do
            PKG_NAME=$(basename "$SRC_PKG")
            if [ -d "$SRC_PKG" ] && [ "$PKG_NAME" != "." ]; then
              rm -rf "$STANDALONE_NM/@prisma/$PKG_NAME"
              cp -rL "$SRC_PKG" "$STANDALONE_NM/@prisma/$PKG_NAME"
              echo "  ✅ @prisma/$PKG_NAME"
            fi
          done

          # ── C: pg dependency tree ────────────────────────────────────────────
          # pnpm does not hoist transitive deps (pg-types, postgres-array, etc.)
          # to node_modules/ root. They only exist inside their parent package's
          # virtual store entry: node_modules/.pnpm/PARENT@V/node_modules/DEP/
          #
          # Strategy: for each pg-* and postgres-* package in the pnpm store,
          # copy its entire node_modules/ sub-tree to standalone/node_modules/.
          # This covers pg, pg-types, pg-pool, pg-protocol, postgres-array,
          # postgres-interval, postgres-date, postgres-bytea, xtend, and ALL
          # other transitive dependencies in one pass.
          echo "Copying pg/postgres dependency tree from pnpm store..."
          for STORE_PKG_DIR in node_modules/.pnpm/pg*/ node_modules/.pnpm/postgres*/; do
            [ -d "$STORE_PKG_DIR" ] || continue
            # Copy all packages in this virtual store entry's node_modules/
            for DEP_DIR in "${STORE_PKG_DIR}node_modules"/*/; do
              DEP_NAME=$(basename "${DEP_DIR%/}")
              [ "$DEP_NAME" = "." ] && continue
              # Skip already-handled @-scoped packages (covered by @prisma/* loop)
              [[ "$DEP_NAME" == @* ]] && continue
              DEST="$STANDALONE_NM/$DEP_NAME"
              # Don't overwrite packages already present (e.g., pg itself)
              if [ ! -d "$DEST" ]; then
                cp -rL "$DEP_DIR" "$DEST"
                echo "  ✅ $DEP_NAME (from $STORE_PKG_DIR)"
              fi
            done
          done

          # ── D: Resolve any remaining pnpm symlinks in standalone ─────────────
          # Some packages (typescript, react-dom, etc.) may remain as symlinks.
          # Walk maxdepth 2 to cover both top-level and @scope/pkg paths.
          echo "Resolving remaining pnpm symlinks..."
          RESOLVED=0
          while IFS= read -r link; do
            target=$(readlink -f "$link")
            if [ -d "$target" ]; then
              rm -rf "$link"
              cp -rL "$target" "$link"
              echo "  ✅ ${link#$STANDALONE_NM/}"
              RESOLVED=$((RESOLVED + 1))
            else
              echo "  ⚠️  ${link#$STANDALONE_NM/} → broken symlink (skipped)"
            fi
          done < <(find "$STANDALONE_NM" -maxdepth 2 -type l)
          echo "  Resolved $RESOLVED additional symlinks"

          # ── Verify critical packages ──────────────────────────────────────────
          if [ ! -f "$STANDALONE_NM/.prisma/client/default.js" ]; then
            echo "❌ ERROR: .prisma/client/default.js not found!"
            exit 1
          fi
          if [ ! -d "$STANDALONE_NM/@prisma/client-runtime-utils" ]; then
            echo "❌ ERROR: @prisma/client-runtime-utils still missing!"
            exit 1
          fi
          if [ ! -d "$STANDALONE_NM/pg-types" ]; then
            echo "❌ ERROR: pg-types still missing!"
            exit 1
          fi
          if [ ! -d "$STANDALONE_NM/postgres-array" ]; then
            echo "❌ ERROR: postgres-array still missing!"
            exit 1
          fi
          echo "✅ .prisma/client, @prisma/client-runtime-utils, pg-types, postgres-array verified"

          cd .next/standalone
          zip -r ../../deploy.zip . -x '*.map'
          cd ../..
          ls -lh deploy.zip

      - name: Login to Azure
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Kudu deployment credentials
        id: kudu-creds
        run: |
          # Get publishing credentials for Kudu API authentication
          CREDS=$(az webapp deployment list-publishing-credentials \
            --name kuromanga \
            --resource-group kuromanga \
            --query "{username:publishingUserName, password:publishingPassword}" \
            --output json)

          KUDU_USER=$(echo "$CREDS" | jq -r '.username')
          KUDU_PASS=$(echo "$CREDS" | jq -r '.password')

          # Mask credentials in logs
          echo "::add-mask::$KUDU_PASS"

          # Export for next step
          echo "KUDU_USER=$KUDU_USER" >> "$GITHUB_OUTPUT"
          echo "KUDU_PASS=$KUDU_PASS" >> "$GITHUB_OUTPUT"

      - name: Deploy via Kudu ZipDeploy API
        id: deploy
        env:
          KUDU_USER: ${{ steps.kudu-creds.outputs.KUDU_USER }}
          KUDU_PASS: ${{ steps.kudu-creds.outputs.KUDU_PASS }}
        run: |
          # Use Kudu ZipDeploy API directly instead of OneDeploy API.
          # OneDeploy (used by azure/webapps-deploy) triggers NodeProjectOptimizer
          # which strips node_modules even with SCM_DO_BUILD_DURING_DEPLOYMENT=false.
          # Kudu ZipDeploy extracts the zip directly to wwwroot without processing.

          KUDU_HOST="kuromanga-eqh9frdqdzbjf9h4.scm.indonesiacentral-01.azurewebsites.net"
          DEPLOY_URL="https://${KUDU_HOST}/api/zipdeploy?isAsync=false"

          echo "Deploying to Kudu ZipDeploy API..."
          echo "  Host: $KUDU_HOST"
          echo "  Package: deploy.zip ($(du -h deploy.zip | cut -f1))"

          HTTP_STATUS=$(curl -s -w "%{http_code}" -o /tmp/deploy-response.txt \
            -X POST \
            -u "${KUDU_USER}:${KUDU_PASS}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            --max-time 300 \
            "$DEPLOY_URL")

          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Deployment successful"
            echo "webapp-url=https://kuromanga.me" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Deployment failed with status $HTTP_STATUS"
            echo "Response:"
            cat /tmp/deploy-response.txt
            exit 1
          fi

      - name: Restart App Service
        run: |
          echo "Restarting Azure App Service..."
          az webapp restart --name kuromanga --resource-group kuromanga
          echo "✅ Restart command sent"

      - name: Verify runtime env (safety check)
        run: |
          # Ensure SKIP_DB_CONNECTION is NOT set in production App Settings.
          # This var is build-time only — if it leaks to runtime, the DB layer
          # silently returns null and the app runs without a database.
          SKIP_DB=$(az webapp config appsettings list \
            --name kuromanga --resource-group kuromanga \
            --query "[?name=='SKIP_DB_CONNECTION'].value | [0]" --output tsv)
          if [ "$SKIP_DB" = "true" ]; then
            echo "::error::SKIP_DB_CONNECTION=true found in App Settings — this disables DB in production!"
            exit 1
          fi
          echo "SKIP_DB_CONNECTION is not set in App Settings (correct)"

      # Note: Direct Azure URL health check is skipped because Azure App Service
      # has IP access restrictions that block GitHub Actions runners.
      # Health verification is done in the post-deploy job via Cloudflare URL.
      - name: Wait for App Service restart
        id: health-poll
        run: |
          echo "Waiting for Azure App Service to restart..."
          # Poll Azure directly (bypassing CF) to detect when the app is ready.
          # Uses x-worker-token so the request passes middleware verification.
          ORIGIN="https://kuromanga-eqh9frdqdzbjf9h4.indonesiacentral-01.azurewebsites.net"
          READY=false
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              -H "x-worker-token: ${{ secrets.WORKER_TOKEN }}" \
              "$ORIGIN/api/health" 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "App is up (HTTP $status) after attempt $i"
              READY=true
              break
            fi
            echo "Attempt $i/12: HTTP $status — waiting 10s..."
            sleep 10
          done
          if [ "$READY" = "true" ]; then
            echo "health_status=ready" >> "$GITHUB_OUTPUT"
            echo "App Service is responding"
          else
            echo "health_status=pending" >> "$GITHUB_OUTPUT"
            echo "::warning::App Service did not respond within 2 minutes — continuing to post-deploy verification"
          fi

  # ==================== POST-DEPLOYMENT ====================
  post-deploy:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy]
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Health check and ISR warmup are best-effort because Cloudflare Bot
      # Fight Mode blocks GitHub Actions datacenter IPs with 403.
      # The actual deployment is verified by the deploy step itself.
      # To fix permanently: add a WAF exception rule in Cloudflare Dashboard
      # for /api/health and /api/internal/* paths from known CI IPs.
      - name: Health Check (via Cloudflare)
        continue-on-error: true
        uses: ./.github/actions/health-check
        with:
          url: "https://kuromanga.me/api/health"
          max-retries: "3"
          retry-delay: "10"
          initial-delay: "5"

      - name: ISR Warmup (seed cache for top pages)
        continue-on-error: true
        run: |
          # Routes through CF Worker (Azure has IP restriction).
          # Public pages don't need auth — Worker proxies normally.
          PAGES=(
            "/"
            "/anime"
            "/komik"
            "/anime/genre"
            "/komik/genre"
            "/komik/berwarna"
          )
          echo "Warming ${#PAGES[@]} pages via kuromanga.me..."
          FAILED=0
          for page in "${PAGES[@]}"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              -H "User-Agent: Mozilla/5.0 (compatible; GitHubActions/2.0; +https://github.com/features/actions)" \
              -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
              "https://kuromanga.me${page}")
            if [ "$status" = "200" ]; then
              echo "  ✅ ${page} → ${status}"
            else
              echo "  ⚠️ ${page} → ${status}"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "Warning: $FAILED pages did not return 200"
          fi

      - name: Deployment Summary
        env:
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "## Azure Production Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| -------- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | https://kuromanga.me |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Azure Origin | https://kuromanga-eqh9frdqdzbjf9h4.indonesiacentral-01.azurewebsites.net |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${COMMIT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${BRANCH_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${ACTOR} |" >> "$GITHUB_STEP_SUMMARY"

  # ==================== FAILURE NOTIFICATION ====================
  notify-failure:
    name: Create Issue on Failure
    runs-on: ubuntu-latest
    needs: [ci, deploy, post-deploy]
    if: failure()
    steps:
      - name: Determine failed job
        id: failed-job
        run: |
          if [ "${{ needs.ci.result }}" = "failure" ]; then
            echo "job=CI Checks" >> "$GITHUB_OUTPUT"
            echo "stage=pre-deployment" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "job=Deploy to Azure" >> "$GITHUB_OUTPUT"
            echo "stage=deployment" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.post-deploy.result }}" = "failure" ]; then
            echo "job=Post-Deployment Verification" >> "$GITHUB_OUTPUT"
            echo "stage=post-deployment" >> "$GITHUB_OUTPUT"
          else
            echo "job=Unknown" >> "$GITHUB_OUTPUT"
            echo "stage=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            const shortSha = context.sha.substring(0, 7);

            const failedJob = '${{ steps.failed-job.outputs.job }}';
            const stage = '${{ steps.failed-job.outputs.stage }}';

            const title = `🚨 Azure Deployment Failed: ${failedJob}`;

            const body = [
              '## Deployment Failure Report',
              '',
              '| Property | Value |',
              '|----------|-------|',
              `| **Failed Job** | ${failedJob} |`,
              `| **Stage** | ${stage} |`,
              `| **Commit** | [\`${shortSha}\`](${commitUrl}) |`,
              '| **Branch** | `${{ github.ref_name }}` |',
              '| **Triggered by** | @${{ github.actor }} |',
              `| **Workflow Run** | [View Logs](${runUrl}) |`,
              `| **Timestamp** | ${new Date().toISOString()} |`,
              '',
              '### Next Steps',
              '',
              `1. Check the [workflow logs](${runUrl}) for details`,
              '2. Fix the issue and push a new commit, or',
              '3. Re-run the workflow manually if it was a transient failure',
              '',
              '### Quick Links',
              '',
              '- [Azure Portal](https://portal.azure.com)',
              '- [Production Site](https://kuromanga.me)',
              '- [Azure Origin](https://kuromanga-eqh9frdqdzbjf9h4.indonesiacentral-01.azurewebsites.net)',
              '',
              '---',
              '*This issue was automatically created by the deployment workflow.*'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['deployment-failure', 'automated']
            });

            console.log(`Created issue: ${title}`);
