name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/proxy/**"
      - "wrangler.jsonc"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  # ==================== DEPLOY WORKER PROXY ====================
  deploy:
    name: Deploy Proxy Worker to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: "https://kuromanga.me"
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

      - name: Create GitHub Deployment Status
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            console.log('Deployed Cloudflare Worker proxy to production: https://kuromanga.me');

  # ==================== POST-DEPLOYMENT ====================
  post-deploy:
    name: Post-Deployment Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy]
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Health Check
        continue-on-error: true
        uses: ./.github/actions/health-check
        with:
          url: "https://kuromanga.me/api/health"
          max-retries: "3"
          retry-delay: "10"
          initial-delay: "15"

      - name: Deployment Summary
        env:
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "## Cloudflare Worker Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| -------- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | https://kuromanga.me |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Worker | kuromanga (proxy) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${COMMIT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${BRANCH_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${ACTOR} |" >> "$GITHUB_STEP_SUMMARY"
