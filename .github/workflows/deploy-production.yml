name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip tests before deployment"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  deployments: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ==================== CI CHECKS ====================
  ci:
    name: CI Checks
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    uses: ./.github/workflows/ci.yml

  # ==================== DEPLOY PRODUCTION ====================
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ci]
    if: always() && (needs.ci.result == 'success' || github.event.inputs.skip_tests == 'true')
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install --global vercel@50

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT

      - name: Create GitHub Deployment Status
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const url = process.env.DEPLOY_URL;
            console.log(`Deployed to production: ${url}`);

  # ==================== POST-DEPLOYMENT ====================
  post-deploy:
    name: Post-Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy]
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Health Check
        uses: ./.github/actions/health-check
        with:
          url: "https://www.kuromanga.me/api/health"
          max-retries: "5"
          retry-delay: "10"
          initial-delay: "15"

      - name: Deployment Summary
        env:
          DEPLOY_URL: ${{ needs.deploy.outputs.url }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| -------- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${DEPLOY_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${COMMIT_SHA}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${BRANCH_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${ACTOR} |" >> $GITHUB_STEP_SUMMARY
