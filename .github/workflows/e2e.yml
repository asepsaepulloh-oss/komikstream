name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - "LICENSE"

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E — ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Desktop Chrome
            project: chromium
            browsers: "chromium"
            artifact: desktop-chromium
          - name: Desktop Firefox
            project: firefox
            browsers: "firefox"
            artifact: desktop-firefox
          - name: Mobile Chrome
            project: "Mobile Chrome"
            browsers: "chromium"
            artifact: mobile-chromium
          - name: Mobile Safari
            project: "Mobile Safari"
            browsers: "webkit"
            artifact: mobile-webkit
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup project
        uses: ./.github/actions/setup
        with:
          prisma-generate: "true"
          next-cache: "true"
          playwright-browsers: ${{ matrix.browsers }}

      - name: Run Playwright tests (${{ matrix.name }})
        run: npx playwright test --project="${{ matrix.project }}"
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dummy"
          CLERK_SECRET_KEY: "sk_test_dummy"
          SKIP_DB_CONNECTION: "true"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report-${{ matrix.artifact }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Test Results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: playwright-results-${{ matrix.artifact }}
          path: test-results/
          retention-days: 7
