name: Cache Warm

on:
  schedule:
    # Every 30 minutes — keeps popular content fresh in KV + DB caches
    - cron: "*/30 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      # Call Azure origin directly — /api/internal/* is blocked at the Worker edge.
      # WORKER_TOKEN authenticates this request as a trusted source.
      AZURE_ORIGIN: ${{ secrets.AZURE_ORIGIN }}
      WORKER_TOKEN: ${{ secrets.WORKER_TOKEN }}
    steps:
      - name: Warm caches
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${AZURE_ORIGIN}/api/internal/cache-warm" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "x-worker-token: ${WORKER_TOKEN}" \
            -H "Content-Type: application/json")
          echo "Response status: $response"
          if [ "$response" != "200" ]; then
            echo "Cache warm failed with status $response"
            exit 1
          fi
