<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="page" x1="160" y1="80" x2="352" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Open book / manga pages -->
  <!-- Left page -->
  <path d="M256 140 L256 400 Q200 380 140 390 L140 130 Q200 120 256 140Z" fill="url(#page)" opacity="0.95"/>
  <!-- Right page -->
  <path d="M256 140 L256 400 Q312 380 372 390 L372 130 Q312 120 256 140Z" fill="url(#page)" opacity="0.95"/>

  <!-- Manga character silhouette on left page -->
  <!-- Head -->
  <circle cx="198" cy="210" r="28" fill="#3B82F6" opacity="0.15"/>
  <!-- Spiky hair (manga style) -->
  <path d="M172 210 L165 180 L178 195 L175 170 L190 190 L192 162 L200 188 L208 165 L210 190 L220 172 L218 195 L228 182 L224 210Z" fill="#3B82F6" opacity="0.25"/>
  <!-- Body hint -->
  <path d="M182 238 Q198 232 214 238 L218 290 Q198 286 178 290Z" fill="#3B82F6" opacity="0.12"/>

  <!-- Panel lines on left page (manga grid) -->
  <line x1="155" y1="260" x2="240" y2="260" stroke="#3B82F6" stroke-width="1.5" opacity="0.2"/>
  <line x1="155" y1="310" x2="240" y2="310" stroke="#3B82F6" stroke-width="1.5" opacity="0.2"/>
  <line x1="198" y1="260" x2="198" y2="370" stroke="#3B82F6" stroke-width="1.5" opacity="0.2"/>

  <!-- Text lines on right page -->
  <rect x="275" y="170" width="75" height="4" rx="2" fill="#3B82F6" opacity="0.18"/>
  <rect x="275" y="185" width="60" height="4" rx="2" fill="#3B82F6" opacity="0.14"/>
  <rect x="275" y="200" width="70" height="4" rx="2" fill="#3B82F6" opacity="0.18"/>
  <rect x="275" y="215" width="50" height="4" rx="2" fill="#3B82F6" opacity="0.12"/>

  <!-- Action lines on right page (speed/impact manga effect) -->
  <line x1="280" y1="280" x2="350" y2="250" stroke="#3B82F6" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <line x1="278" y1="295" x2="355" y2="270" stroke="#3B82F6" stroke-width="1" opacity="0.12" stroke-linecap="round"/>
  <line x1="282" y1="310" x2="348" y2="290" stroke="#3B82F6" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
  <line x1="280" y1="325" x2="352" y2="308" stroke="#3B82F6" stroke-width="1" opacity="0.1" stroke-linecap="round"/>

  <!-- Star/sparkle accent -->
  <path d="M345 150 L350 135 L355 150 L370 145 L355 150 L360 165 L355 150 L340 155Z" fill="white" opacity="0.7"/>
  <path d="M155 395 L158 387 L161 395 L169 393 L161 395 L163 403 L161 395 L153 397Z" fill="white" opacity="0.5"/>

  <!-- Book spine shadow -->
  <line x1="256" y1="130" x2="256" y2="405" stroke="#1e40af" stroke-width="3" opacity="0.15"/>
</svg>
