# Gitleaks configuration
# https://github.com/gitleaks/gitleaks

[allowlist]
  description = "Global allowlist"

  # auth-config.ts uses "sk_test_placeholder" and "sk_test_dummy" as comparison
  # values for rejecting dummy Clerk keys — these are NOT actual secrets.
  # CI workflows also use "pk_test_dummy" for build-time env vars.
  paths = []
  regexTarget = "match"
  regexes = [
    '''sk_test_placeholder''',
    '''sk_test_dummy''',
    '''pk_test_dummy''',
  ]
